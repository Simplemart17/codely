# Edge reverse proxy for the Codely app with an automatic maintenance fallback.
#
# Normal:            tunnel -> web:80 -> app:3005
# App down/starting: connect to app fails (502/504) -> serve maintenance.html (503)
# Planned window:    /etc/nginx/maintenance.enabled present -> serve maintenance.html (503)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  # WebSocket upgrade passthrough (harmless for plain HTTP requests).
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Preserve an upstream-provided X-Forwarded-Host (e.g. from the edge Worker,
  # which sets the real public host). Fall back to the request Host for direct
  # tunnel access so absolute URLs / server-action origin checks stay correct.
  map $http_x_forwarded_host $forwarded_host {
    default $http_x_forwarded_host;
    '' $host;
  }

  server {
    listen 80;
    server_name _;

    # Docker's embedded DNS. Resolving the app via a variable + resolver (rather
    # than a static upstream) lets nginx START even when the app isn't up yet,
    # and re-resolve per request — so a restarted app is picked up, and a missing
    # app yields a 502 that falls through to the maintenance page (never a
    # startup crash-loop).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Container healthcheck target — 200 as long as nginx itself is running,
    # independent of whether the app upstream is up.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # The maintenance page. `internal` = only reachable via the error_page
    # fallback below, never requested directly.
    location = /maintenance.html {
      root /usr/share/nginx/html;
      internal;
      add_header Retry-After 120 always;
      add_header Cache-Control "no-store" always;
    }

    location / {
      # Planned-maintenance switch (evaluated per request, no reload needed):
      #   docker compose --env-file .env.docker exec web touch /etc/nginx/maintenance.enabled
      #   docker compose --env-file .env.docker exec web rm    /etc/nginx/maintenance.enabled
      if (-f /etc/nginx/maintenance.enabled) {
        return 503;
      }

      # Variable host forces per-request resolution via the resolver above.
      set $app_upstream app:3005;
      proxy_pass http://$app_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
      proxy_set_header X-Forwarded-Host $forwarded_host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # Fail fast to the maintenance page when the app is unreachable/restarting.
      proxy_connect_timeout 3s;
      proxy_next_upstream error timeout;
    }

    # App unreachable (502 refused / 504 timeout) or planned 503 -> maintenance,
    # normalized to a 503 so crawlers treat it as temporary.
    error_page 502 503 504 =503 /maintenance.html;
  }
}
